services:
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    platform: linux/amd64
    container_name: calendarly-backend
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - db-data:/data
      - ./server/backups:/usr/src/app/backups
      - ./server/opencode-cache:/usr/src/app/opencode-cache:ro
      - ./OPENCLAW_MCP.md:/usr/src/app/OPENCLAW_MCP.md:ro
    env_file:
      - .env
    environment:
      - DATABASE_PATH=/data/calendarly.db
    restart: unless-stopped
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETUID
      - SETGID
      - NET_BIND_SERVICE
    security_opt:
      - no-new-privileges:true
    networks:
      - app-net

  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: calendarly-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    env_file:
      - .env
    environment:
      - VITE_BACKEND_URL=http://backend:3000
    restart: unless-stopped
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETUID
      - SETGID
      - NET_BIND_SERVICE
    security_opt:
      - no-new-privileges:true
    networks:
      - app-net

  chromium:
    image: ghcr.io/linuxserver/chromium:latest
    container_name: calendarly-chromium
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
      - NO_DECOR=true
      - CHROME_CLI=--no-first-run --no-default-browser-check --disable-sync --disable-translate --disable-session-crashed-bubble --hide-crash-restore-bubble --start-maximized https://github.com/bysandries
      - CUSTOM_WIDTH=1920
      - CUSTOM_HEIGHT=1080
      - GTK_CSD=0
    volumes:
      - ./browser-data:/config
      - ./browser-config/labwc-template.xml:/defaults/labwc.xml:ro
      - ./browser-config/autostart-wayland:/defaults/autostart_wayland:ro
      - ./browser-config/autostart-wayland:/defaults/autostart:ro
      - ./browser-config/autostart-wayland:/config/.config/openbox/autostart:ro
      - ./browser-policies/managed:/etc/chromium/policies/managed:ro
    ports:
      - "3010:3000"
    shm_size: "1gb"
    security_opt:
      - seccomp:unconfined
    restart: unless-stopped
    networks:
      - app-net

volumes:
  db-data:
    driver: local

networks:
  app-net:
    driver: bridge
