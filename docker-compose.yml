services:
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    platform: linux/amd64
    container_name: calendarly-backend
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - db-data:/data
      - ./server/backups:/usr/src/app/backups
      - ./server/opencode-cache:/usr/src/app/opencode-cache:ro
      - ./OPENCLAW_MCP.md:/usr/src/app/OPENCLAW_MCP.md:ro
    env_file:
      - .env
    environment:
      - DATABASE_PATH=/data/calendarly.db
    restart: unless-stopped
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETUID
      - SETGID
      - NET_BIND_SERVICE
    security_opt:
      - no-new-privileges:true
    networks:
      - app-net

  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: calendarly-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    env_file:
      - .env
    environment:
      - VITE_BACKEND_URL=http://backend:3000
    restart: unless-stopped
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETUID
      - SETGID
      - NET_BIND_SERVICE
    security_opt:
      - no-new-privileges:true
    networks:
      - app-net

  chromium:
    image: ghcr.io/linuxserver/chromium:latest
    container_name: calendarly-chromium
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
      - CHROME_CLI=https://www.google.com
    ports:
      - "3010:3000"
    shm_size: "1gb"
    security_opt:
      - seccomp:unconfined
    restart: unless-stopped

volumes:
  db-data:
    driver: local

networks:
  app-net:
    driver: bridge
