server {
    listen 5173;
    server_name localhost;

    client_max_body_size 100M;

    add_header Permissions-Policy "clipboard-read=*, clipboard-write=*" always;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to the backend microservice
    location /api {
        proxy_pass http://backend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    # Proxy Chromium/KasmVNC — same origin so we can inject CSS to hide controls
    location /browser/ {
        proxy_pass http://chromium:3000/;
        proxy_http_version 1.1;

        # WebSocket support (KasmVNC VNC stream)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;

        # Disable upstream compression so sub_filter can work
        proxy_set_header Accept-Encoding "";

        # Inject CSS that hides the KasmVNC floating control bar
        sub_filter_once on;
        sub_filter_types text/html;
        sub_filter '</head>' '<style>
          #noVNC_control_bar_anchor,
          #noVNC_control_bar,
          .noVNC_status_bar,
          #noVNC_status { display: none !important; }
        </style></head>';
    }
}
